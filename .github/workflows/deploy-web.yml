name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'example/**'
      - 'docs/**'
      - 'pnpm-lock.yaml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Export web build
        working-directory: example
        run: npx expo export --platform web

      - name: Build docs
        run: pnpm docs:build

      - name: Merge into single artifact
        run: |
          mkdir -p _site
          cp -r docs/build/. _site/
          cp -r example/dist/. _site/demo/

      - name: Add SPA fallback for demo routes
        run: |
          SCRIPT='<script>(function(){var p=window.location.pathname;if(p.startsWith("/ui/demo/")){var r=p.slice("/ui/demo/".length);sessionStorage.setItem("spa-redirect",r+window.location.search);window.location.replace("/ui/demo/")}})();</script>'
          sed -i "s|</head>|${SCRIPT}</head>|" _site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
